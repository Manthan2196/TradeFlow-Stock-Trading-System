const CompanyAnnouncementsPage = () => {
  const { addNotif } = useApp();
  const { data, loading, refetch } = useData(()=>api.companyAnnouncements(), []);
  const announcements = data?.announcements || [];

  const BLANK = { title:'', content:'', announcement_type:'RESULTS', effective_date:'', is_published:false };
  const [form,    setForm]    = useState(BLANK);
  const [editing, setEditing] = useState(null);   // announcement_id or null
  const [showForm,setShowForm]= useState(false);
  const [saving,  setSaving]  = useState(false);

  const openNew = () => { setForm(BLANK); setEditing(null); setShowForm(true); };
  const openEdit = a => {
    setForm({
      title:             a.title,
      content:           a.content,
      announcement_type: a.announcement_type,
      effective_date:    a.effective_date ? a.effective_date.slice(0,10) : '',
      is_published:      a.is_published,
    });
    setEditing(a.announcement_id);
    setShowForm(true);
  };

  const handleSave = async () => {
    if (!form.title || !form.content) return addNotif({t:'err',title:'Title and content required.'});
    setSaving(true);
    try {
      if (editing) {
        await api.updateAnnouncement(editing, form);
        addNotif({t:'ok',title:'Announcement updated.'});
      } else {
        await api.createAnnouncement(form);
        addNotif({t:'ok',title:'Announcement created.'});
      }
      setShowForm(false); refetch();
    } catch(e) {
      addNotif({t:'err',title:'Failed to save.', msg:e.message});
    } finally { setSaving(false); }
  };

  const handlePublish = async a => {
    try {
      await api.updateAnnouncement(a.announcement_id, {...a, is_published:true});
      addNotif({t:'ok',title:'Published successfully.'});
      refetch();
    } catch(e) { addNotif({t:'err',title:'Failed to publish.'}); }
  };

  const handleDelete = async id => {
    if (!confirm('Delete this draft announcement?')) return;
    try {
      await api.deleteAnnouncement(id);
      addNotif({t:'ok',title:'Deleted.'}); refetch();
    } catch(e) { addNotif({t:'err',title:'Cannot delete published announcement.'}); }
  };

  const ANN_TYPES = ['DIVIDEND','SPLIT','BONUS','RESULTS','AGM','OTHER'];

  return (
    <div className="fu">
      <div className="ph between">
        <div>
          <div className="ph-title">Announcements</div>
          <div className="ph-sub">Manage regulatory disclosures and press releases</div>
        </div>
        <button className="btn btn-primary row g6" onClick={openNew}>
          <Icon n="plus" size={14}/>New Announcement
        </button>
      </div>

      {showForm && (
        <div className="card mb24" style={{border:'1px solid var(--blue)',background:'var(--bg2)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>
            {editing ? 'Edit Announcement' : 'New Announcement'}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div style={{gridColumn:'1/-1'}}>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Title *</label>
              <input className="inp" value={form.title}
                onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                placeholder="e.g. Q3 FY2025 Dividend Declaration"/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Type *</label>
              <select className="inp" value={form.announcement_type}
                onChange={e=>setForm(f=>({...f,announcement_type:e.target.value}))}>
                {ANN_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Effective Date</label>
              <input className="inp" type="date" value={form.effective_date}
                onChange={e=>setForm(f=>({...f,effective_date:e.target.value}))}/>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Content *</label>
              <textarea className="inp" rows={5} value={form.content}
                onChange={e=>setForm(f=>({...f,content:e.target.value}))}
                placeholder="Full announcement text…" style={{resize:'vertical'}}/>
            </div>
            <div style={{gridColumn:'1/-1',display:'flex',alignItems:'center',gap:8}}>
              <input type="checkbox" id="pub_chk" checked={form.is_published}
                onChange={e=>setForm(f=>({...f,is_published:e.target.checked}))}/>
              <label htmlFor="pub_chk" style={{fontSize:13,cursor:'pointer'}}>
                Publish immediately (cannot be deleted after publishing)
              </label>
            </div>
          </div>
          <div className="row g8">
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? <span className="spin spin-sm"/> : (editing ? 'Update' : 'Create')}
            </button>
            <button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      {loading ? <SkTable/> : (
        <div className="card">
          <table className="tbl">
            <thead>
              <tr>
                <th>Title</th><th>Type</th><th>Effective Date</th>
                <th>Status</th><th>Created</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {announcements.length === 0 && (
                <tr><td colSpan={6} style={{textAlign:'center',color:'var(--text3)',padding:24}}>
                  No announcements yet. Create your first one.
                </td></tr>
              )}
              {announcements.map(a=>(
                <tr key={a.announcement_id}>
                  <td style={{fontWeight:600,maxWidth:240}}>{a.title}</td>
                  <td><span className="badge bb">{a.announcement_type}</span></td>
                  <td style={{fontSize:12}}>{a.effective_date ? new Date(a.effective_date).toLocaleDateString('en-IN') : '—'}</td>
                  <td>
                    <span className={`badge ${a.is_published?'bg':'ba'}`}>
                      {a.is_published ? '✓ Published' : 'Draft'}
                    </span>
                  </td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{new Date(a.created_at).toLocaleDateString()}</td>
                  <td>
                    <div className="row g6">
                      <button className="btn btn-xs btn-outline" onClick={()=>openEdit(a)}>Edit</button>
                      {!a.is_published && <>
                        <button className="btn btn-xs btn-primary" onClick={()=>handlePublish(a)}>Publish</button>
                        <button className="btn btn-xs btn-outline"
                          style={{color:'var(--red)',borderColor:'rgba(255,61,107,.3)'}}
                          onClick={()=>handleDelete(a.announcement_id)}>Delete</button>
                      </>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

const CompanyFinancialsPage = () => {
  const { addNotif } = useApp();
  const { data, loading, refetch } = useData(()=>api.companyFinancials(), []);
  const financials = data?.financials || [];

  const BLANK = { quarter:'Q1', fiscal_year: new Date().getFullYear(), revenue:'', net_profit:'', eps:'' };
  const [form,    setForm]    = useState(BLANK);
  const [showForm,setShowForm]= useState(false);
  const [saving,  setSaving]  = useState(false);

  const handleSave = async () => {
    if (!form.revenue || !form.net_profit || !form.eps)
      return addNotif({t:'err',title:'All financial fields are required.'});
    setSaving(true);
    try {
      await api.createFinancial(form);
      addNotif({t:'ok',title:'Financial result saved.'});
      setShowForm(false); setForm(BLANK); refetch();
    } catch(e) {
      addNotif({t:'err',title:'Failed to save.', msg:e.message});
    } finally { setSaving(false); }
  };

  const crore = n => {
    const v = parseFloat(n||0);
    if (Math.abs(v) >= 1e7) return `₹${(v/1e7).toFixed(2)} Cr`;
    if (Math.abs(v) >= 1e5) return `₹${(v/1e5).toFixed(2)} L`;
    return `₹${v.toLocaleString('en-IN',{minimumFractionDigits:2})}`;
  };

  return (
    <div className="fu">
      <div className="ph between">
        <div>
          <div className="ph-title">Financial Results</div>
          <div className="ph-sub">Quarterly earnings disclosures</div>
        </div>
        <button className="btn btn-primary row g6" onClick={()=>setShowForm(s=>!s)}>
          <Icon n="plus" size={14}/>Upload Results
        </button>
      </div>

      {showForm && (
        <div className="card mb24" style={{border:'1px solid var(--blue)',background:'var(--bg2)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>Upload Quarterly Result</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:16}}>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Quarter</label>
              <select className="inp" value={form.quarter}
                onChange={e=>setForm(f=>({...f,quarter:e.target.value}))}>
                {['Q1','Q2','Q3','Q4'].map(q=><option key={q}>{q}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Fiscal Year</label>
              <input className="inp" type="number" value={form.fiscal_year}
                onChange={e=>setForm(f=>({...f,fiscal_year:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Revenue (₹)</label>
              <input className="inp" type="number" value={form.revenue} placeholder="e.g. 50000000"
                onChange={e=>setForm(f=>({...f,revenue:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Net Profit (₹)</label>
              <input className="inp" type="number" value={form.net_profit} placeholder="e.g. 8000000"
                onChange={e=>setForm(f=>({...f,net_profit:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>EPS (₹)</label>
              <input className="inp" type="number" step="0.01" value={form.eps} placeholder="e.g. 12.50"
                onChange={e=>setForm(f=>({...f,eps:e.target.value}))}/>
            </div>
          </div>
          <div className="row g8">
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? <span className="spin spin-sm"/> : 'Save Result'}
            </button>
            <button className="btn btn-outline" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      {loading ? <SkTable/> : (
        <div className="card">
          <table className="tbl">
            <thead>
              <tr>
                <th>Quarter</th><th>Fiscal Year</th>
                <th style={{textAlign:'right'}}>Revenue</th>
                <th style={{textAlign:'right'}}>Net Profit</th>
                <th style={{textAlign:'right'}}>EPS</th>
                <th style={{textAlign:'right'}}>Profit Margin</th>
                <th>Published</th>
              </tr>
            </thead>
            <tbody>
              {financials.length === 0 && (
                <tr><td colSpan={7} style={{textAlign:'center',color:'var(--text3)',padding:24}}>
                  No results uploaded yet.
                </td></tr>
              )}
              {financials.map(f=>{
                const margin = parseFloat(f.revenue)>0
                  ? ((parseFloat(f.net_profit)/parseFloat(f.revenue))*100).toFixed(1)
                  : '—';
                const isProfit = parseFloat(f.net_profit||0)>=0;
                return (
                  <tr key={f.financial_id}>
                    <td><span className="badge bb">{f.quarter}</span></td>
                    <td style={{fontWeight:600}}>FY{f.fiscal_year}</td>
                    <td style={{textAlign:'right',fontFamily:'JetBrains Mono'}}>{crore(f.revenue)}</td>
                    <td style={{textAlign:'right',fontFamily:'JetBrains Mono',color:isProfit?'var(--green)':'var(--red)'}}>
                      {crore(f.net_profit)}
                    </td>
                    <td style={{textAlign:'right',fontFamily:'JetBrains Mono'}}>₹{parseFloat(f.eps).toFixed(2)}</td>
                    <td style={{textAlign:'right',color:isProfit?'var(--green)':'var(--red)'}}>
                      {margin !== '—' ? `${margin}%` : '—'}
                    </td>
                    <td style={{fontSize:11,color:'var(--text3)'}}>{new Date(f.published_at).toLocaleDateString()}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════
   COMPANY PROFILE PAGE
════════════════════════════════════════════ */
const CompanyProfilePage = () => {
  const { addNotif } = useApp();
  const { data, loading, refetch } = useData(()=>api.companyProfile(), []);
  const profile = data?.profile || {};

  const [editing, setEditing] = useState(false);
  const [form,    setForm]    = useState({});
  const [saving,  setSaving]  = useState(false);

  useEffect(()=>{
    if (profile.company_id) {
      setForm({
        contact_email:      profile.contact_email || '',
        website:            profile.website || '',
        registered_address: profile.registered_address || '',
      });
    }
  },[profile.company_id]);

  const handleSave = async () => {
    setSaving(true);
    try {
      await api.put('/company/profile', form);
      addNotif({t:'ok',title:'Profile updated.'}); setEditing(false); refetch();
    } catch(e) {
      addNotif({t:'err',title:'Failed to update.', msg:e.message});
    } finally { setSaving(false); }
  };

  if (loading) return <div className="fu"><SkCard/></div>;

  return (
    <div className="fu">
      <div className="ph between">
        <div>
          <div className="ph-title">Company Profile</div>
          <div className="ph-sub">Your registered company details on TradeFlow</div>
        </div>
        {!editing && (
          <button className="btn btn-outline row g6" onClick={()=>setEditing(true)}>
            <Icon n="logs" size={13}/>Edit Profile
          </button>
        )}
      </div>

      <div className="g2" style={{gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Identity card */}
        <div className="card">
          <div className="between mb16">
            <div style={{fontWeight:700,fontSize:14}}>Company Identity</div>
            {profile.verified
              ? <span className="badge bg row g4"><Icon n="chk" size={11}/>Verified</span>
              : <span className="badge ba">Pending Verification</span>}
          </div>
          {[
            {l:'Company Name',   v:profile.company_name},
            {l:'CIN Number',     v:profile.cin_number||'—'},
            {l:'Listed Symbol',  v:profile.symbol},
            {l:'Stock Name',     v:profile.stock_name},
          ].map((r,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <span style={{color:'var(--text3)'}}>{r.l}</span>
              <span style={{fontWeight:600}}>{r.v}</span>
            </div>
          ))}
        </div>

        {/* Editable details */}
        <div className="card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>Contact Details</div>
          {editing ? (
            <>
              {[
                {l:'Contact Email',      k:'contact_email',      type:'email'},
                {l:'Website',           k:'website',             type:'url'},
                {l:'Registered Address',k:'registered_address',  type:'text'},
              ].map(({l,k,type})=>(
                <div key={k} style={{marginBottom:12}}>
                  <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>{l}</label>
                  <input className="inp" type={type} value={form[k]||''}
                    onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>
                </div>
              ))}
              <div className="row g8 mt12">
                <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                  {saving?<span className="spin spin-sm"/>:'Save Changes'}
                </button>
                <button className="btn btn-outline" onClick={()=>setEditing(false)}>Cancel</button>
              </div>
            </>
          ) : (
            <>
              {[
                {l:'Contact Email', v:profile.contact_email||'—'},
                {l:'Website',       v:profile.website       ? <a href={profile.website} target="_blank" rel="noreferrer" style={{color:'var(--blue)'}}>{profile.website}</a> : '—'},
                {l:'Address',       v:profile.registered_address||'—'},
              ].map((r,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
                  <span style={{color:'var(--text3)'}}>{r.l}</span>
                  <span style={{fontWeight:600,maxWidth:'60%',textAlign:'right'}}>{r.v}</span>
                </div>
              ))}
            </>
          )}
        </div>
      </div>

      {!profile.verified && (
        <div className="card mt20" style={{border:'1px solid var(--amber)',background:'rgba(255,184,0,.05)'}}>
          <div className="row g10">
            <Icon n="alrt" size={18} color="var(--amber)"/>
            <div>
              <div style={{fontWeight:700,color:'var(--amber)',fontSize:13}}>Verification Pending</div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:3}}>
                Your company profile is awaiting admin verification. Some features may be limited until verified.
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════════
   ADMIN: COMPANIES TAB (added to AdminPage)
════════════════════════════════════════════ */
const AdminCompaniesTab = () => {
  const { addNotif } = useApp();
  const { data, loading, refetch } = useData(()=>api.adminCompanies(), []);
  const companies = data?.companies || [];

  const handleVerify = async (id, verified) => {
    try {
      await api.verifyCompany(id, verified);
      addNotif({t:'ok',title:verified?'Company verified.':'Verification revoked.'});
      refetch();
    } catch(e) { addNotif({t:'err',title:'Failed to update verification.'}); }
  };

  const handleDelete = async id => {
    if (!confirm('Delete this company profile?')) return;
    try {
      await api.deleteCompany(id);
      addNotif({t:'ok',title:'Company profile deleted.'}); refetch();
    } catch(e) { addNotif({t:'err',title:'Failed to delete.'}); }
  };

  return (
    <div>
      <div className="between mb16">
        <div style={{fontWeight:700,fontSize:14}}>Registered Companies</div>
        <span style={{fontSize:12,color:'var(--text3)'}}>{companies.length} total</span>
      </div>
      {loading ? <SkTable/> : (
        <table className="tbl">
          <thead>
            <tr>
              <th>Company Name</th><th>Stock Symbol</th>
              <th>Contact Email</th><th>Status</th>
              <th>Registered</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {companies.length===0 && (
              <tr><td colSpan={6} style={{textAlign:'center',color:'var(--text3)',padding:24}}>No company profiles registered.</td></tr>
            )}
            {companies.map(c=>(
              <tr key={c.company_id}>
                <td style={{fontWeight:600}}>{c.company_name}</td>
                <td><span className="badge bb">{c.symbol}</span></td>
                <td style={{fontSize:12,color:'var(--text3)'}}>{c.contact_email||'—'}</td>
                <td>
                  <span className={`badge ${c.verified?'bg':'ba'}`}>
                    {c.verified?'✓ Verified':'Pending'}
                  </span>
                </td>
                <td style={{fontSize:11,color:'var(--text3)'}}>{new Date(c.created_at).toLocaleDateString()}</td>
                <td>
                  <div className="row g6">
                    {c.verified
                      ? <button className="btn btn-xs btn-outline" onClick={()=>handleVerify(c.company_id,false)}>Revoke</button>
                      : <button className="btn btn-xs btn-primary" onClick={()=>handleVerify(c.company_id,true)}>Verify</button>
                    }
                    <button className="btn btn-xs btn-outline"
                      style={{color:'var(--red)',borderColor:'rgba(255,61,107,.3)'}}
                      onClick={()=>handleDelete(c.company_id)}>Delete</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
};

const App = () => {
  const [isLoggedIn,  setLoggedIn]  = useState(false);
  const [user,        setUser]      = useState(null);
  const [authChecked, setAuthChk]   = useState(false);
  const [dark,        setDark]      = useState(true);
  const [page,        setPage]      = useState('dashboard');
  const [sbOpen,      setSbOpen]    = useState(false);
  const [notifs,      setNotifs]    = useState([]);
  const [preselect,   setPreselect] = useState(null);

  const [stocks,       setStocks]    = useState(null);
  const [wallet,       setWallet]    = useState(null);
  const [portfolio,    setPortfolio] = useState(null);
  const [recentOrders, setRecentOrd] = useState(null);

  useEffect(()=>{ document.documentElement.className = dark?'':'light'; },[dark]);

  // Restore JWT session
  useEffect(()=>{
    const tok = localStorage.getItem('tf_token');
    if (tok) {
      api.setToken(tok);
      api.me()
        .then(d=>{ setUser(d.user); setLoggedIn(true); setAuthChk(true); })
        .catch(()=>{ localStorage.removeItem('tf_token'); setAuthChk(true); });
    } else { setAuthChk(true); }
  },[]);

  const [backendErr, setBackendErr] = useState(null);

  const fetchAll = useCallback(async()=>{
    if (!isLoggedIn) return;
    const isCompany = user?.role === 'COMPANY';

    // COMPANY users don't need wallet/portfolio/orders - those are USER features
    if (isCompany) {
      const [s] = await Promise.allSettled([api.stocks()]);
      setStocks(s.status==='fulfilled' ? (s.value?.stocks || []) : []);
      setBackendErr(s.status==='rejected' ? (s.reason?.message || 'Cannot reach backend.') : null);
      return;
    }

    // Use allSettled so one failing call never wipes out the others
    const [s, w, p, o] = await Promise.allSettled([
      api.stocks(), api.wallet(), api.portfolio(), api.orders(),
    ]);

    const log = (name, r) => {
      if (r.status === 'rejected') console.error(`[fetchAll] ${name} failed:`, r.reason?.message);
    };
    log('stocks', s); log('wallet', w); log('portfolio', p); log('orders', o);

    setStocks(    s.status==='fulfilled' ? (s.value?.stocks    || []) : []);
    setWallet(    w.status==='fulfilled' ? (w.value?.wallet    || null) : null);
    setPortfolio( p.status==='fulfilled' ? (p.value?.portfolio || []) : []);
    setRecentOrd( o.status==='fulfilled' ? (o.value?.orders    || []) : []);

    if (s.status==='rejected') {
      setBackendErr(s.reason?.message || 'Cannot reach backend. Is the server running on port 4000?');
    } else {
      setBackendErr(null);
    }
  },[isLoggedIn, user?.role]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  // 5-second polling for live feel (skip wallet/portfolio for COMPANY role)
  useEffect(()=>{
    if (!isLoggedIn) return;
    const isCompany = user?.role === 'COMPANY';
    const id = setInterval(()=>{
      api.stocks().then(d=>{ if(d?.stocks) setStocks(d.stocks); }).catch(()=>{});
      if (!isCompany) {
        api.wallet().then(d=>{ if(d?.wallet) setWallet(d.wallet); }).catch(()=>{});
      }
    }, 5000);
    return ()=>clearInterval(id);
  },[isLoggedIn, user?.role]);

  const addNotif = useCallback(n=>{
    const id = Date.now();
    setNotifs(prev=>[...prev,{...n,id}]);
    setTimeout(()=>setNotifs(prev=>prev.filter(x=>x.id!==id)), 6000);
  },[]);
  const removeNotif = useCallback(id=>setNotifs(prev=>prev.filter(n=>n.id!==id)),[]);

  const handleLogin = useCallback(u=>{
    setUser(u);
    setLoggedIn(true);
    // COMPANY users land on company dashboard
    if (u?.role === 'COMPANY') setPage('co_dashboard');
    else setPage('dashboard');
  },[]);
  const logout = useCallback(()=>{
    setLoggedIn(false); setUser(null);
    setStocks(null); setWallet(null); setPortfolio(null); setRecentOrd(null);
    api.clearToken(); localStorage.removeItem('tf_token');
    setPage('dashboard');
  },[]);

  const clearPreselect = useCallback(()=>setPreselect(null),[]);

  const PAGES = {
    // USER pages
    dashboard: <Dashboard/>,
    stocks:    <StocksPage/>,
    order:     <OrderPage/>,
    portfolio: <PortfolioPage/>,
    wallet:    <WalletPage/>,
    history:   <HistoryPage/>,
    // ADMIN pages
    admin:     <AdminPage/>,
    logs:      <LogsPage/>,
    // COMPANY pages
    co_dashboard:     <CompanyDashboard/>,
    co_stock:         <CompanyStockPage/>,
    co_profile:       <CompanyProfilePage/>,
  };

  // Auth check loader
  if (!authChecked) return (
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:20}}>
      <div style={{width:48,height:48,borderRadius:14,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'var(--shadow-glow)'}}>
        <Icon n="chart" size={24} color="#060810"/>
      </div>
      <span className="spin spin-lg"/>
      <span style={{color:'var(--text3)',fontSize:13}}>Checking session…</span>
    </div>
  );

  if (!isLoggedIn) return <Login onLogin={handleLogin}/>;

  const ctx = {
    user, wallet, stocks, portfolio, recentOrders,
    refreshAll: fetchAll, addNotif, logout,
    page, setPage, preselect, setPreselect, clearPreselect,
  };

  return (
    <Ctx.Provider value={ctx}>
      <NotifStack items={notifs} remove={removeNotif}/>
      <Sidebar page={page} setPage={setPage} open={sbOpen} setOpen={setSbOpen}/>
      {sbOpen&&<div className="mob-ov" onClick={()=>setSbOpen(false)}/>}
      <div className="main">
        {backendErr && (
          <div style={{
            background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:0,
            padding:'10px 24px',display:'flex',alignItems:'center',gap:12,
            fontSize:13,color:'var(--red)',position:'sticky',top:0,zIndex:250,
          }}>
            <Icon n="lock" size={14}/>
            <span><strong>Backend error:</strong> {backendErr}</span>
            <button className="btn btn-xs btn-outline" style={{marginLeft:'auto',borderColor:'var(--red)',color:'var(--red)'}}
              onClick={fetchAll}>Retry</button>
          </div>
        )}
        <Ticker stocks={stocks||[]}/>
        <Topbar dark={dark} setDark={setDark} setSbOpen={setSbOpen}/>
        <div className="content">
          <div key={page} className="fu">
            {PAGES[page]||<Dashboard/>}
          </div>
        </div>
      </div>
    </Ctx.Provider>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
